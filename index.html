<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
    <title>Bloom Within</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="app">
      <header class="hud">
        <h1 class="title">Bloom Within</h1>
        <nav class="controls">
          <button id="btn-guided" class="ctrl" type="button">Guided Mode</button>
        </nav>
      </header>

      <div class="stage">
        <canvas id="game" width="480" height="270" aria-label="Flower shop scene"></canvas>
      </div>

      <footer class="hint">
        <p>Tap a flower to hear what it has to say.</p>
      </footer>
    </main>
    <script type="module" src="src/game.js"></script>
  </body>
</html>
